name: Feature request
description: Propose a clear product, CLI, documentation, or packaging improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: State the request in one or two direct sentences.
      placeholder: Add a clearer text explanation when inbound execution stays blocked because the runtime configuration proves multiple candidate listeners.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - discover
        - inspect
        - speed limiter behavior
        - CLI help or output
        - documentation
        - installation or packaging
        - repository presentation
        - other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or gap
      description: Explain what is difficult, unclear, or missing today.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the user-facing behavior you want.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope notes
      description: Call out constraints, non-goals, or why this should stay narrow if that matters.

  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Links, examples, or operator context that helps evaluate the request.

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I checked the current docs and existing issues first.
          required: true
        - label: I described the request in terms of current product behavior rather than repository process.
          required: true
